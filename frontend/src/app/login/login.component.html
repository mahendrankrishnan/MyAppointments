<div class="login-container">
  <div class="login-card">
    <div class="logo-container">
      <div class="logo">🔒</div>
    </div>
    <h2>Login</h2>
    
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="email">Email *</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          placeholder="Enter your email"
          [class.error]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched"
        />
        <div *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched" 
             class="error-message">
          <span *ngIf="loginForm.get('email')?.errors?.['required']">Email is required</span>
          <span *ngIf="loginForm.get('email')?.errors?.['email']">Please enter a valid email</span>
        </div>
      </div>

      <div class="form-group">
        <label for="phone">Phone *</label>
        <input
          id="phone"
          type="tel"
          formControlName="phone"
          placeholder="Enter your phone number"
          [class.error]="loginForm.get('phone')?.invalid && loginForm.get('phone')?.touched"
        />
        <div *ngIf="loginForm.get('phone')?.invalid && loginForm.get('phone')?.touched" 
             class="error-message">
          Phone is required
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password *</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          placeholder="Enter your password"
          [class.error]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
        />
        <div *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched" 
             class="error-message">
          Password is required
        </div>
      </div>

      <div *ngIf="errorMessage" class="alert alert-error">
        {{ errorMessage }}
      </div>

      <button type="submit" class="btn btn-primary btn-block" [disabled]="loginForm.invalid || submitting">
        {{ submitting ? 'Logging in...' : 'Login' }}
      </button>
    </form>
  </div>
</div>
