<div *ngIf="sessionTimeout.showWarning()" class="session-timeout-overlay" role="dialog" aria-modal="true" aria-labelledby="session-timeout-title">
  <div class="session-timeout-dialog card">
    <h2 id="session-timeout-title">Session Expiring Soon</h2>
    <p>
      Your session will expire due to inactivity in
      <strong>{{ formatTime(sessionTimeout.secondsRemaining()) }}</strong>.
    </p>
    <p class="session-timeout-subtext">Choose to stay signed in or log out now.</p>

    <div class="session-timeout-actions">
      <button type="button" class="btn btn-primary" (click)="stayLoggedIn()">
        Stay Logged In
      </button>
      <button type="button" class="btn btn-secondary" (click)="logout()">
        Log Out
      </button>
    </div>
  </div>
</div>
